<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Databricks Question Bank</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Local Practice Bank</p>
          <h1>Databricks Question Bank</h1>
          <p id="subtitle" class="subtitle">스크랩한 배치 결과로 만든 로컬 문제 풀이 뷰어</p>
        </div>

        <div class="panel">
          <label id="language-label" class="field-label" for="language-select">Language</label>
          <select id="language-select" class="text-input">
            <option value="ko">한국어</option>
            <option value="en">English</option>
          </select>
        </div>

        <div class="panel">
          <label id="search-label" class="field-label" for="search-input">검색</label>
          <input id="search-input" class="text-input" type="search" placeholder="문장, 보기, 질문 번호로 검색">
        </div>

        <div class="panel">
          <label id="filter-label" class="field-label" for="filter-select">필터</label>
          <select id="filter-select" class="text-input">
            <option value="all">전체</option>
            <option value="unsolved">미풀이</option>
            <option value="correct">정답</option>
            <option value="incorrect">오답</option>
          </select>
        </div>

        <div class="panel stats" id="stats"></div>

        <div class="panel">
          <label id="page-size-label" class="field-label" for="page-size-select">목록 표시 개수</label>
          <select id="page-size-select" class="text-input">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
          </select>
        </div>

        <div class="question-list" id="question-list"></div>
        <div class="list-pager" id="list-pager"></div>
      </aside>

      <main class="content">
        <div class="toolbar">
          <button id="prev-button" class="button secondary" type="button">이전</button>
          <button id="next-button" class="button secondary" type="button">다음</button>
          <button id="random-button" class="button" type="button">랜덤</button>
          <button id="wrong-notes-button" class="button secondary" type="button">오답노트</button>
          <button id="toggle-answer-button" class="button accent" type="button">정답 보기</button>
          <button id="reset-progress-button" class="button ghost" type="button">진행 초기화</button>
        </div>

        <article class="card" id="question-card">
          <p id="loading-text" class="empty-state">문제를 불러오는 중입니다...</p>
        </article>
      </main>
    </div>

    <script src="./question-bank.js"></script>
    <script src="./question-bank-translation.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
